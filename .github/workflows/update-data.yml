name: 🎤 Atualizar dados ao vivo

on:
  schedule:
    - cron: "*/5 * * * *"    # a cada 5 minutos
  workflow_dispatch:           # também permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests rich urllib3

      - name: Buscar dados (Spotify + Deezer + Instagram)
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python verificador.py --spotify --json-only

      - name: Commit e push do historico_metricas.json
        run: |
          git config user.name  "Joelma Analytics Bot"
          git config user.email "bot@joelma-analytics"
          git add historico_metricas.json
          git diff --cached --quiet || git commit -m "🔴 Dados ao vivo $(date +'%d/%m/%Y %H:%M') BRT"
          git push
